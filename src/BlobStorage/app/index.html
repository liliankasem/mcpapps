<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blob Storage</title>
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #111d33;
      --bg-card: #162340;
      --text-primary: #e8edf5;
      --text-secondary: #8899b5;
      --accent: #0078d4;
      --accent-light: #3a9aed;
      --success: #2ea043;
      --error: #d93025;
      --border: #243656;
    }

    [data-theme="light"] {
      --bg-primary: #f0f4f8;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a2233;
      --text-secondary: #4a5568;
      --accent: #0078d4;
      --accent-light: #2b88d8;
      --border: #d0d7e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #002050 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    [data-theme="light"] body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, #d6e4f0 100%);
    }

    .widget {
      width: 100%;
      max-width: 600px;
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      display: none;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(0, 120, 212, 0.1);
      border-color: var(--accent);
    }

    .icon { font-size: 28px; line-height: 1; }
    .title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .content-area {
      padding: 16px 20px;
      min-height: 80px;
      max-height: 460px;
      overflow-y: auto;
    }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: border-color 0.15s, background 0.1s;
    }

    .result-card.clickable {
      cursor: pointer;
    }

    .result-card.clickable:hover {
      border-color: var(--accent);
      background: rgba(0, 120, 212, 0.06);
    }

    .result-title { font-size: 13px; font-weight: 500; color: var(--text-primary); word-break: break-all; }
    .result-meta { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

    .success-card { border-color: var(--success); background: rgba(46, 160, 67, 0.08); }
    .success-card .result-title { color: var(--success); }

    .error-card { border-color: var(--error); background: rgba(217, 48, 37, 0.08); }
    .error-card .result-title { color: var(--error); }

    .code-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
    }

    .loading {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 24px 0;
    }

    .footer {
      padding: 10px 20px;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header" id="header-area">
      <div class="icon" id="storage-icon">📦</div>
      <div>
        <p class="title" id="title">Blob Storage</p>
        <p class="subtitle" id="subtitle">Waiting for tool output…</p>
      </div>
    </div>
    <div id="content-area" class="content-area">
    </div>
    <div class="footer" id="footer">Connecting...</div>
  </div>
  <script type="module" src="/src/blobstorage-app.ts"></script>
</body>
</html>
