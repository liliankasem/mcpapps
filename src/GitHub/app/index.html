<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2128;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --purple: #bc8cff;
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-card: #ffffff;
      --border: #d0d7de;
      --text-primary: #1f2328;
      --text-secondary: #656d76;
      --accent: #0969da;
      --green: #1a7f37;
      --red: #d1242f;
      --purple: #8250df;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .icon { font-size: 28px; line-height: 1; }

    .title { font-size: 16px; font-weight: 600; color: var(--text-primary); }

    .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .back-btn {
      display: none;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      margin-right: 8px;
      transition: background 0.15s, border-color 0.15s;
    }

    .back-btn:hover {
      background: var(--bg-card);
      border-color: var(--accent);
    }

    .content-area {
      padding: 12px;
      max-height: 520px;
      overflow-y: auto;
    }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: border-color 0.15s, background 0.1s;
    }

    .result-card.clickable {
      cursor: pointer;
    }

    .result-card.clickable:hover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.04);
    }

    .result-card:last-child { margin-bottom: 0; }

    .result-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .result-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.4; }
    .result-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }

    .state-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .state-open { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .state-closed { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .state-merged { background: rgba(188, 140, 255, 0.15); color: var(--purple); }

    .success-card { border-color: var(--green); background: rgba(63, 185, 80, 0.08); }

    .code-block {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
      color: var(--text-primary);
    }

    .loading { text-align: center; color: var(--text-secondary); padding: 24px; font-size: 14px; }

    .footer {
      padding: 8px 20px;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      text-align: right;
      background: var(--bg-card);
    }

    /* Detail view styles */
    .detail-view { padding: 4px; }

    .detail-header-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .detail-author {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .detail-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .detail-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .detail-field {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .detail-field strong {
      color: var(--text-primary);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(88, 166, 255, 0.1);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, 0.2);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .detail-stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-value.addition { color: var(--green); }
    .stat-value.deletion { color: var(--red); }

    .stat-label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .detail-body {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .detail-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .detail-meta p {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header" id="header-area">
      <div class="icon" id="gh-icon">🐙</div>
      <div>
        <p class="title" id="title">GitHub</p>
        <p class="subtitle" id="subtitle">Waiting for tool output…</p>
      </div>
    </div>
    <div id="content-area" class="content-area">
    </div>
    <div class="footer" id="footer">Connecting...</div>
  </div>
  <script type="module" src="/src/github-app.ts"></script>
</body>
</html>
