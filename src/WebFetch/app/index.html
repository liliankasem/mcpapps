<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebFetch</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-primary: #0f0e1a;
        --bg-secondary: #1a1830;
        --bg-card: rgba(255, 255, 255, 0.04);
        --text-primary: #e8e6f0;
        --text-secondary: #9d99b0;
        --accent: #7c6cff;
        --accent-glow: rgba(124, 108, 255, 0.25);
        --border: rgba(255, 255, 255, 0.08);
        --link-color: #a78bfa;
      }

      [data-theme="light"] {
        --bg-primary: #f5f3ff;
        --bg-secondary: #ede9fe;
        --bg-card: rgba(0, 0, 0, 0.03);
        --text-primary: #1e1b3a;
        --text-secondary: #6b6590;
        --accent: #6d5cce;
        --accent-glow: rgba(109, 92, 206, 0.15);
        --border: rgba(0, 0, 0, 0.08);
        --link-color: #6d28d9;
      }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        color: var(--text-primary);
        line-height: 1.6;
      }

      .container {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        padding: 20px;
        gap: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        backdrop-filter: blur(12px);
      }

      .back-btn {
        display: none;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 500;
        color: var(--accent);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        flex-shrink: 0;
      }

      .back-btn:hover {
        background: var(--accent-glow);
        border-color: var(--accent);
      }

      .fetch-icon { font-size: 28px; flex-shrink: 0; }

      .header-text { flex: 1; min-width: 0; }

      .header-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-secondary);
        font-weight: 600;
      }

      .url-display {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        word-break: break-all;
        margin-top: 2px;
      }

      .content-card {
        flex: 1;
        padding: 20px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        backdrop-filter: blur(12px);
        overflow: auto;
        max-height: 480px;
      }

      .content-area { font-size: 14px; color: var(--text-primary); }

      .content-text {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      .hint {
        color: var(--text-secondary);
        font-style: italic;
        text-align: center;
        padding: 20px 0;
      }

      .links-section {
        display: none;
        padding: 16px 20px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        backdrop-filter: blur(12px);
        max-height: 360px;
        overflow: auto;
      }

      .links-section h3 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        margin-bottom: 12px;
        font-weight: 600;
      }

      .links-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .link-item {
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      .link-item:hover {
        background: var(--accent-glow);
        border-color: var(--accent);
      }

      .link-text {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
      }

      .link-url {
        display: block;
        font-size: 12px;
        color: var(--link-color);
        word-break: break-all;
        margin-top: 2px;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: var(--text-secondary);
        padding: 4px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header" id="header-area">
        <span class="fetch-icon" id="fetch-icon">🌐</span>
        <div class="header-text">
          <div class="header-label">Fetched URL</div>
          <div class="url-display" id="url-display">Waiting for request…</div>
        </div>
      </div>

      <div class="content-card">
        <div class="content-area" id="content-area">
          <p class="hint">Use <strong>fetch_url</strong> or <strong>list_links</strong> to view web content here.</p>
        </div>
      </div>

      <div class="links-section" id="links-section">
        <h3>Links Found</h3>
        <ul class="links-list" id="links-list"></ul>
      </div>

      <div class="footer" id="footer">Connecting…</div>
    </div>

    <script type="module" src="/src/webfetch-app.ts"></script>
  </body>
</html>
