<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email &amp; Calendar Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2128;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #d29922;
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-card: #ffffff;
      --border: #d0d7de;
      --text-primary: #1f2328;
      --text-secondary: #656d76;
      --accent: #0969da;
      --green: #1a7f37;
      --red: #d1242f;
      --purple: #8250df;
      --orange: #9a6700;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .icon { font-size: 28px; line-height: 1; }
    .title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .content-area {
      padding: 12px;
      max-height: 520px;
      overflow-y: auto;
    }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: border-color 0.15s, background 0.1s;
    }

    .result-card:last-child { margin-bottom: 0; }

    .result-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .result-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.4; }
    .result-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-sent { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .badge-unread { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .badge-read { background: rgba(139, 148, 158, 0.15); color: var(--text-secondary); }
    .badge-event { background: rgba(188, 140, 255, 0.15); color: var(--purple); }
    .badge-allday { background: rgba(210, 153, 34, 0.15); color: var(--orange); }

    .success-card { border-color: var(--green); background: rgba(63, 185, 80, 0.08); }

    .loading { text-align: center; color: var(--text-secondary); padding: 24px; font-size: 14px; }

    .footer {
      padding: 8px 20px;
      font-size: 11px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      text-align: right;
      background: var(--bg-card);
    }

    .time-block {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .time-block .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div class="icon" id="widget-icon">📧</div>
      <div>
        <p class="title" id="title">Email &amp; Calendar</p>
        <p class="subtitle" id="subtitle">Waiting for tool output…</p>
      </div>
    </div>
    <div id="content-area" class="content-area">
    </div>
    <div class="footer" id="footer">Connecting...</div>
  </div>
  <script type="module" src="/src/emailcalendar-app.ts"></script>
</body>
</html>
